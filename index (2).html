function toast(msg, type='info') {
  const t = {msg, type, id: Date.now()};
  appState.toasts.push(t);
  render();
  setTimeout(() => {
    appState.toasts = appState.toasts.filter(x => x.id !== t.id);
    render();
  }, 3500);
}

function avatarHTML(size=36, picData=null, initials='A', fontSize=14) {
  const bg = 'background:var(--blue)';
  if (picData) return `<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;flex-shrink:0;${bg}"><img src="${picData}" style="width:100%;height:100%;object-fit:cover;" /></div>`;
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${fontSize}px;font-weight:600;flex-shrink:0;${bg};color:#fff">${initials}</div>`;
}

function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  const v = appState.view;
  if (v === 'login') { app.innerHTML = renderLogin(); }
  else if (v === 'forgot') { app.innerHTML = renderForgot(); }
  else { app.innerHTML = renderApp(); }
  bindEvents();
}

function renderForgot() {
  let body = '';
  if (forgotStep===1) body = `<div class="form-group"><label>Registered Email</label><input id="fp-email" placeholder="Enter your registered email"></div><button class="btn btn-primary" style="width:100%" onclick="forgotNext()">📧 Send OTP</button>`;
  else if (forgotStep===2) body = `<div class="alert alert-info">📬 OTP sent. Check your email. (Demo: use 123456)</div>
    <div style="display:flex;gap:8px;justify-content:center;margin:16px 0">
      ${[0,1,2,3,4,5].map(i=>`<input style="width:40px;height:48px;text-align:center;font-size:20px;font-weight:700;background:var(--navy);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);outline:none" maxlength="1" id="otp-${i}" oninput="if(this.value&&${i}<5)document.getElementById('otp-${i+1}').focus()" onkeydown="if(event.key==='Backspace'&&!this.value&&${i}>0)document.getElementById('otp-${i-1}').focus()">`).join('')}
    </div><button class="btn btn-primary" style="width:100%" onclick="forgotNext()">✅ Verify OTP</button>`;
  else body = `<div class="form-group"><label>New Password</label><input type="password" id="fp-p1" placeholder="Min 8 chars"></div><div class="form-group"><label>Confirm Password</label><input type="password" id="fp-p2" placeholder="Re-enter password"></div><div id="fp-msg"></div><button class="btn btn-primary" style="width:100%" onclick="forgotNext()">🔒 Reset Password</button>`;
  return `<div class="auth-wrap"><div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-icon">${forgotStep===1?'📧':forgotStep===2?'🔑':'🔒'}</div><h1>${forgotStep===1?'Forgot Password':forgotStep===2?'Verify OTP':'Set New Password'}</h1><p>${forgotStep===1?'OTP will be sent to your email':forgotStep===2?'Enter the 6-digit OTP':'Create a strong password'}</p></div>
    ${body}
    <div class="otp-link" style="margin-top:14px"><a onclick="appState.view='login';render()">← Back to Login</a></div>
  </div></div>`;
}

function forgotNext() {
  if (forgotStep===1) { forgotStep=2; render(); }
  else if (forgotStep===2) {
    const otp = [0,1,2,3,4,5].map(i=>document.getElementById(`otp-${i}`)?.value||'').join('');
    if (otp==='123456') { forgotStep=3; render(); }
    else toast('Invalid OTP. Demo OTP is 123456','error');
  } else {
    const p1=document.getElementById('fp-p1')?.value, p2=document.getElementById('fp-p2')?.value;
    if (!p1||p1.length<8){toast('Password must be at least 8 characters','error');return;}
    if (p1!==p2){toast('Passwords do not match','error');return;}
    S.password = p1; saveData(S);
    creds.admin.password = p1; saveCreds(creds);
    appState.view='login'; forgotStep=1; render();
    setTimeout(()=>toast('Password reset successfully! You can now login.','success'),100);
  }
}

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${s.attendance_pct}%</div><div class="stat-label">Attendance</div></div>
    <div class="stat-card"><div class="stat-icon">📝</div><div class="stat-value">82%</div><div class="stat-label">Avg Score</div></div>

function renderStudentProfile() {

    <div class="profile-avatar-lg">${s.first_name.charAt(0)}</div>
    <div><h2 style="font-size:18px;font-weight:700">${s.first_name} ${s.last_name}</h2><p style="color:var(--text2);font-size:13px">${s.email}</p><div style="display:flex;gap:6px;margin-top:8px"><span class="badge badge-blue">${s.student_id}</span><span class="badge badge-purple">Roll #${s.roll_number}</span></div></div>

}

function renderStudentAttendance() {
  const s=students[0],pct=s.attendance_pct,p=Math.round(pct/100*26),a=Math.floor((100-pct)/100*26*.7),l=26-p-a;
  return `<div class="profile-header" style="padding:20px"><div style="flex:1"><h2 style="font-size:16px">Attendance — ${s.first_name} ${s.last_name}</h2><p style="font-size:13px;color:var(--text2)">${s.class_name}</p></div><div style="text-align:center"><div style="font-size:36px;font-weight:800;color:${pct>90?'var(--green)':pct>75?'var(--blue-light)':'var(--red)'}">${pct}%</div><div style="font-size:12px;color:var(--text2)">Overall</div></div></div>
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${p}</div><div class="stat-label">Present</div></div><div class="stat-card"><div class="stat-icon">❌</div><div class="stat-value">${a}</div><div class="stat-label">Absent</div></div><div class="stat-card"><div class="stat-icon">🏖️</div><div class="stat-value">${l}</div><div class="stat-label">Leave</div></div></div>`;
}

function renderStudentMarks() {
  const t=marks.reduce((a,m)=>a+m.obtained,0),max=marks.reduce((a,m)=>a+m.total,0),pct=Math.round(t/max*100);
  return `<div class="section-header"><div class="section-title">My Results</div></div>
  <div class="stats-grid"><div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value">${pct}%</div><div class="stat-label">Overall</div></div><div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-value">A</div><div class="stat-label">Grade</div></div><div class="stat-card"><div class="stat-icon">🥇</div><div class="stat-value">#2</div><div class="stat-label">Rank</div></div><div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${marks.length}/${marks.length}</div><div class="stat-label">Passed</div></div></div>
  <div class="card"><div class="table-wrap"><table><thead><tr><th>Subject</th><th>Obtained</th><th>Total</th><th>%</th><th>Grade</th><th>Status</th></tr></thead><tbody>
    ${marks.map(m=>`<tr><td style="font-weight:500">${m.subject}</td><td style="font-size:16px;font-weight:700;color:${m.obtained>=80?'var(--green)':'var(--blue-light)'}">${m.obtained}</td><td style="color:var(--text2)">${m.total}</td><td>${m.percentage}%</td><td><div class="grade-pill grade-${m.grade}">${m.grade==='Ap'?'A+':m.grade}</div></td><td><span class="badge ${m.obtained>=40?'badge-green':'badge-red'}">${m.obtained>=40?'Pass':'Fail'}</span></td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function renderStudentFees() {
  const myFees=fees.filter(f=>f.student_id===1);const total=myFees.reduce((a,f)=>a+f.amount,0),paid=myFees.reduce((a,f)=>a+f.paid_amount,0);
  return `<div class="section-header"><div class="section-title">My Fees</div></div>
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">₨${total.toLocaleString()}</div><div class="stat-label">Total</div></div><div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">₨${paid.toLocaleString()}</div><div class="stat-label">Paid</div></div><div class="stat-card"><div class="stat-icon">⏰</div><div class="stat-value">₨${(total-paid).toLocaleString()}</div><div class="stat-label">Pending</div></div></div>
  <div class="card"><div class="table-wrap"><table><thead><tr><th>Type</th><th>Month</th><th>Amount</th><th>Paid</th><th>Due Date</th><th>Status</th></tr></thead><tbody>
    ${myFees.map(f=>`<tr><td style="font-weight:500">${f.fee_type}</td><td style="font-size:11px;color:var(--text2)">${f.month_year||'—'}</td><td style="font-weight:600">₨${f.amount.toLocaleString()}</td><td style="color:${f.paid_amount>0?'var(--green)':'var(--text2)'}">₨${f.paid_amount.toLocaleString()}</td><td style="font-size:12px">${f.due_date}</td><td><span class="badge ${f.status==='paid'?'badge-green':f.status==='partial'?'badge-gold':'badge-red'}">${f.status}</span></td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function bindEvents() {}

function setLoginTab(t) { appState.loginTab=t; render(); }
function navigate(n) { appState.nav=n; render(); }
function setSettingsTab(t) { appState.settingsTab=t; tempProfilePic=null; tempLogoPic=null; render(); }
function doLogout() { appState.view='login'; appState.user=null; appState.nav='dashboard'; render(); }

function doLogin() {
  const emailEl=document.getElementById('li-email'),passEl=document.getElementById('li-pass');
  if(!emailEl||!passEl)return;
  const email=emailEl.value.trim(), pass=passEl.value;
  creds=loadCreds();
  if(appState.loginTab==='admin') {
    if((email===creds.admin.email||email===creds.admin.username||email===S.username)&&pass===creds.admin.password) {
      appState.user={role:'super_admin',email:S.email,name:S.fullName};
      appState.view='app'; appState.nav='dashboard'; render();
    } else { document.getElementById('login-msg').innerHTML=`<div class="alert alert-error">❌ Invalid credentials. Email/username and password must match.</div>`; }
  } else {
    if((email===creds.student.email||email===creds.student.username)&&pass===creds.student.password) {
      appState.user={role:'student',email:creds.student.email,name:students[0].first_name+' '+students[0].last_name};
      appState.view='app'; appState.nav='dashboard'; render();
    } else { document.getElementById('login-msg').innerHTML=`<div class="alert alert-error">❌ Invalid student credentials.</div>`; }
  }
}

function toggleEye(id) {
  const el=document.getElementById(id);
  if(!el)return;
  el.type=el.type==='password'?'text':'password';
}

function handleProfilePic(ev) {
  const f=ev.target.files[0]; if(!f)return;
  if(f.size>2*1024*1024){toast('File too large. Max 2MB allowed.','error');return;}
  const r=new FileReader();
  r.onload=e=>{ tempProfilePic=e.target.result; render(); };
  r.readAsDataURL(f);
}

function handleLogoPic(ev) {
  const f=ev.target.files[0]; if(!f)return;
  if(f.size>2*1024*1024){toast('File too large. Max 2MB allowed.','error');return;}
  const r=new FileReader();
  r.onload=e=>{ tempLogoPic=e.target.result; render(); };
  r.readAsDataURL(f);
}

function removePic() { S.profilePicture=null; tempProfilePic=null; saveData(S); render(); toast('Profile picture removed','info'); }
function removeLogo() { S.logoData=null; tempLogoPic=null; saveData(S); render(); toast('Logo removed','info'); }

function saveProfile() {
  const fn=document.getElementById('set-fullname')?.value?.trim();
  const un=document.getElementById('set-username')?.value?.trim();
  if(!fn){toast('Full name cannot be empty','error');return;}
  if(!un){toast('Username cannot be empty','error');return;}
  if(un.length<3){toast('Username must be at least 3 characters','error');return;}
  S.fullName=fn; S.username=un;
  if(tempProfilePic){ S.profilePicture=tempProfilePic; tempProfilePic=null; }
  saveData(S);
  creds.admin.username=un; saveCreds(creds);
  if(appState.user) appState.user.name=fn;
  render();
  toast('Profile saved successfully! Username and name updated.','success');
}

function resetProfile() {
  tempProfilePic=null;
  document.getElementById('set-fullname').value=DEFAULTS.fullName;
  document.getElementById('set-username').value=DEFAULTS.username;
  toast('Fields reset to default values','info');
}

function saveEmail() {
  const newEmail=document.getElementById('set-email')?.value?.trim();
  const pass=document.getElementById('set-email-pass')?.value;
  const msgEl=document.getElementById('email-msg');
  if(!newEmail){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Email field is required</div>`;return;}
  const emailReg=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!emailReg.test(newEmail)){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Invalid email format</div>`;return;}
  if(!pass){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Current password is required to change email</div>`;return;}
  creds=loadCreds();
  if(pass!==creds.admin.password){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Incorrect current password</div>`;return;}
  if(newEmail===S.email){if(msgEl)msgEl.innerHTML=`<div class="alert alert-warn">⚠️ This is already your email address</div>`;return;}
  S.email=newEmail; saveData(S);
  creds.admin.email=newEmail; saveCreds(creds);
  if(appState.user) appState.user.email=newEmail;
  if(msgEl)msgEl.innerHTML='';
  document.getElementById('set-email').value='';
  document.getElementById('set-email-pass').value='';
  render();
  toast(`Email updated to ${newEmail}. Use new email to login.`,'success');
}

function checkPassStrength() {
  const p=document.getElementById('sp-new')?.value||'';
  const el=document.getElementById('pass-strength'); if(!el)return;
  let score=0,tips=[];
  if(p.length>=8)score++;else tips.push('8+ chars');
  if(/[A-Z]/.test(p))score++;else tips.push('uppercase');
  if(/[0-9]/.test(p))score++;else tips.push('number');
  if(/[^A-Za-z0-9]/.test(p))score++;else tips.push('symbol');
  const labels=['','Weak','Fair','Good','Strong'];
  const colors=['','var(--red)','var(--gold)','var(--blue)','var(--green)'];
  el.innerHTML=score===0?'':`<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
    <div style="display:flex;gap:3px">${[1,2,3,4].map(i=>`<div style="width:32px;height:4px;border-radius:2px;background:${i<=score?colors[score]:'var(--surface3)'}"></div>`).join('')}</div>
    <span style="font-size:11px;color:${colors[score]}">${labels[score]}${tips.length?` · needs: ${tips.join(', ')}`:''}</span>
  </div>`;
}

function checkPassMatch() {
  const p1=document.getElementById('sp-new')?.value||'',p2=document.getElementById('sp-confirm')?.value||'';
  const el=document.getElementById('pass-match'); if(!el)return;
  if(!p2)el.innerHTML='';
  else if(p1===p2)el.innerHTML=`<span style="color:var(--green)">✅ Passwords match</span>`;
  else el.innerHTML=`<span style="color:var(--red)">❌ Passwords do not match</span>`;
}

function savePassword() {
  const oldP=document.getElementById('sp-old')?.value;
  const newP=document.getElementById('sp-new')?.value;
  const conP=document.getElementById('sp-confirm')?.value;
  const msgEl=document.getElementById('pass-msg');
  if(!oldP){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Current password is required</div>`;return;}
  creds=loadCreds();
  if(oldP!==creds.admin.password){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Current password is incorrect</div>`;return;}
  if(!newP||newP.length<8){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ New password must be at least 8 characters</div>`;return;}
  if(newP===oldP){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ New password must be different from current password</div>`;return;}
  if(newP!==conP){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Passwords do not match</div>`;return;}
  S.password=newP; saveData(S);
  creds.admin.password=newP; saveCreds(creds);
  if(msgEl)msgEl.innerHTML='';
  document.getElementById('sp-old').value='';
  document.getElementById('sp-new').value='';
  document.getElementById('sp-confirm').value='';
  const se=document.getElementById('pass-strength'); if(se)se.innerHTML='';
  const me=document.getElementById('pass-match'); if(me)me.innerHTML='';
  toast('Password updated successfully! New password is active immediately.','success');
}

function saveStudentPassword() {
  const oldP=document.getElementById('sp-old')?.value;
  const newP=document.getElementById('sp-new')?.value;
  const conP=document.getElementById('sp-confirm')?.value;
  const msgEl=document.getElementById('pass-msg');
  creds=loadCreds();
  if(!oldP||oldP!==creds.student.password){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Current password is incorrect</div>`;return;}
  if(!newP||newP.length<8){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Password must be at least 8 characters</div>`;return;}
  if(newP!==conP){if(msgEl)msgEl.innerHTML=`<div class="alert alert-error">❌ Passwords do not match</div>`;return;}
  creds.student.password=newP; saveCreds(creds);
  toast('Password changed successfully!','success');
  ['sp-old','sp-new','sp-confirm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function saveCenter() {
  const name=document.getElementById('sc-name')?.value?.trim();
  const contact=document.getElementById('sc-contact')?.value?.trim();
  const whatsapp=document.getElementById('sc-whatsapp')?.value?.trim();
  const address=document.getElementById('sc-address')?.value?.trim();
  const website=document.getElementById('sc-website')?.value?.trim();
  if(!name){toast('Center name cannot be empty','error');return;}
  if(!contact){toast('Contact number cannot be empty','error');return;}
  S.centerName=name; S.contactNumber=contact; S.whatsapp=whatsapp||''; S.address=address||''; S.website=website||'';
  if(tempLogoPic){S.logoData=tempLogoPic;tempLogoPic=null;}
  saveData(S);
  render();
  toast('Center information saved successfully!','success');
}

function resetCenter() {
  tempLogoPic=null;
  if(document.getElementById('sc-name'))document.getElementById('sc-name').value=DEFAULTS.centerName;
  if(document.getElementById('sc-contact'))document.getElementById('sc-contact').value=DEFAULTS.contactNumber;
  if(document.getElementById('sc-whatsapp'))document.getElementById('sc-whatsapp').value=DEFAULTS.whatsapp;
  if(document.getElementById('sc-address'))document.getElementById('sc-address').value=DEFAULTS.address;
  if(document.getElementById('sc-website'))document.getElementById('sc-website').value=DEFAULTS.website;
  toast('Fields reset to defaults','info');
}

function saveSocial() {
  S.facebook=document.getElementById('ss-fb')?.value?.trim()||'';
  S.instagram=document.getElementById('ss-insta')?.value?.trim()||'';
  S.twitter=document.getElementById('ss-twitter')?.value?.trim()||'';
  S.youtube=document.getElementById('ss-yt')?.value?.trim()||'';
  S.website=document.getElementById('ss-web')?.value?.trim()||'';
  saveData(S); render();
  toast('Social links saved successfully!','success');
}

function resetSocial() {
  ['ss-fb','ss-insta','ss-twitter','ss-yt','ss-web'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  toast('Social fields cleared','info');
}

function exportSettings() {
  const data=JSON.stringify({...S,password:'[hidden]'},null,2);
  const b=new Blob([data],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='jecr-settings.json'; a.click();
  toast('Settings exported as JSON file','success');
}

function resetAllSettings() {
  if(!confirm('Reset ALL settings to factory defaults? This cannot be undone.'))return;
  Object.assign(S,DEFAULTS); saveData(S);
  creds.admin={email:DEFAULTS.email,password:DEFAULTS.password,username:DEFAULTS.username}; saveCreds(creds);
  render(); toast('All settings reset to default values','info');
}

function clearAllData() {
  if(!confirm('Clear ALL saved data from localStorage? You will need to reconfigure everything.'))return;
  localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_CRED);
  S=Object.assign({},DEFAULTS); creds=loadCreds();
  render(); toast('All saved data cleared','info');
}

render();
</script>
