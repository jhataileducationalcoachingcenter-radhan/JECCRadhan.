function bindLogin() {

function renderForgot() {
  let content = '';
  if (forgotStep === 1) {
    content = `
      <div class="form-group">
        <label>Registered Email</label>
        <input type="email" id="fp-email" placeholder="Enter your email address">
      </div>
      <button class="btn btn-primary" id="fp-btn">📧 Send OTP</button>`;
  } else if (forgotStep === 2) {
    content = `
      <div class="alert alert-info">📬 OTP sent to your email. Valid for 5 minutes.</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px;text-align:center">Enter the 6-digit OTP</p>
      <div class="otp-inputs">
        ${[0,1,2,3,4,5].map(i=>`<input class="otp-box" maxlength="1" id="otp-${i}" oninput="moveOtp(${i})" onkeydown="backOtp(event,${i})">`).join('')}
      </div>
      <button class="btn btn-primary" id="fp-btn" style="margin-top:8px">✅ Verify OTP</button>
      <div class="otp-link"><a onclick="forgotStep=1;render()">← Resend OTP</a></div>`;
  } else {
    content = `
      <div class="alert alert-success">✅ OTP verified. Set your new password.</div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="fp-pass1" placeholder="Min 8 chars, uppercase, number, symbol">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="fp-pass2" placeholder="Re-enter new password">
      </div>
      <button class="btn btn-primary" id="fp-btn">🔒 Reset Password</button>`;
  }

  return `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">${forgotStep===1?'📧':forgotStep===2?'🔑':'🔒'}</div>
        <h1>${forgotStep===1?'Forgot Password':forgotStep===2?'Verify OTP':'Reset Password'}</h1>
        <p>${forgotStep===1?'Enter your email to receive OTP':forgotStep===2?'Check your email for the OTP':'Create a strong new password'}</p>
      </div>
      <div id="fp-alert"></div>
      ${content}
      <div class="otp-link" style="margin-top:16px"><a onclick="state.view='login';render()">← Back to Login</a></div>
    </div>
  </div>`;
}

function moveOtp(i) {
  const val = document.getElementById(`otp-${i}`).value;
  if (val && i < 5) document.getElementById(`otp-${i+1}`).focus();
}
function backOtp(e, i) {
  if (e.key === 'Backspace' && !document.getElementById(`otp-${i}`).value && i > 0) document.getElementById(`otp-${i-1}`).focus();
}

function bindForgot() {
  const btn = document.getElementById('fp-btn');
  if (!btn) return;
  btn.onclick = () => {
    if (forgotStep === 1) { forgotStep = 2; render(); }
    else if (forgotStep === 2) {
      const otp = [0,1,2,3,4,5].map(i=>document.getElementById(`otp-${i}`)?.value||'').join('');
      if (otp.length === 6) { forgotStep = 3; render(); }
      else document.getElementById('fp-alert').innerHTML = '<div class="alert alert-error">Enter all 6 digits</div>';
    } else {
      const p1 = document.getElementById('fp-pass1')?.value;
      const p2 = document.getElementById('fp-pass2')?.value;
      if (p1 !== p2) { document.getElementById('fp-alert').innerHTML = '<div class="alert alert-error">Passwords do not match</div>'; return; }
      state.view = 'login'; render();
      setTimeout(() => { document.getElementById('login-alert').innerHTML = '<div class="alert alert-success">✅ Password reset successfully. Please login.</div>'; }, 100);
    }
  };
}

              <td style="color:${f.paid_amount>0?'var(--green)':'var(--text2)'}">₨ ${f.paid_amount.toLocaleString()}</td>
              <td style="font-size:12px">${f.due_date}</td>
              <td style="font-size:12px;color:var(--text2)">${f.paid_date||'—'}</td>
              <td><span class="badge ${f.status==='paid'?'badge-green':f.status==='partial'?'badge-gold':'badge-red'}">${f.status}</span></td>
              <td style="font-family:var(--mono);font-size:11px;color:var(--text2)">${f.receipt_number}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

  if (viewStudentId) {

    if (!s) return '';

    <div class="modal-overlay" onclick="if(event.target.classList.contains('modal-overlay')){viewStudentId=null;render()}">

// ── ACTIONS ────────────────────────────────────────────────
function navigate(nav) {
  state.activeNav = nav;
  selectedClassFilter = '';
  render();
}

function viewStudent(id) {
  viewStudentId = id;
  render();
}

function generateIdCard(id) {
  viewStudentId = id;
  render();
}

function deleteStudent(id) {
  if (confirm('Deactivate this student?')) {
    state.students = state.students.filter(s => s.id !== id);
    render();
    showAlert('Student record deactivated.');
  }
}

function deleteAnnouncement(id) {
  state.announcements = state.announcements.filter(a => a.id !== id);
  render();
}

function deleteCalEvent(id) {
  state.calendar = state.calendar.filter(e => e.id !== id);
  render();
}

function saveStudent() {
  const newId = Math.max(...state.students.map(s=>s.id)) + 1;
  state.students.push({
    id: newId, student_id: `JECR-25-${1000+newId}`,
    first_name: 'New', last_name: 'Student',
    email: 'new@demo.com', class_name: 'Class 10', batch_name: 'Morning Batch',
    gender: 'male', roll_number: String(newId),
    parent_name: 'Parent Name', parent_contact: '0300-0000000',
    student_contact: '0311-0000000', admission_date: new Date().toISOString().split('T')[0],
    date_of_birth: '2009-01-01', attendance_pct: 0, total_fee: 15000, paid_fee: 0,
    home_address: 'Radhan, Punjab'
  });
  addStudentModal = false;
  render();
  showAlert('Student added successfully! ✅');
}

function saveAnnouncement() {
  const title = document.getElementById('ann-title')?.value;
  const content = document.getElementById('ann-body')?.value;
  const type = document.getElementById('ann-type')?.value;
  if (!title || !content) { alert('Title and content required'); return; }
  state.announcements.unshift({
    id: Date.now(), title, content, type,
    created_at: new Date().toISOString().split('T')[0],
    created_by_email: state.user.email
  });
  addAnnouncementModal = false;
  render();
  showAlert('Announcement published! ✅');
}

function saveCalEvent() {
  const title = document.getElementById('cal-title')?.value;
  const start = document.getElementById('cal-start')?.value;
  const type = document.getElementById('cal-type')?.value;
  if (!title || !start) { alert('Title and start date required'); return; }
  state.calendar.push({ id: Date.now(), title, event_type: type, start_date: start, end_date: document.getElementById('cal-end')?.value || null, description: '' });
  addCalendarModal = false;
  render();
  showAlert('Event added! ✅');
}

function updatePage() {
  const page = document.getElementById('page-content');
  if (page) page.innerHTML = renderPage();
  bindPageActions();
}

function showAlert(msg) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;color:var(--text);font-family:var(--font);font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-width:300px;animation:slideIn 0.3s ease';
  div.innerHTML = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

function bindApp() { bindPageActions(); }
function bindPageActions() {}

// Init
render();
</script>
